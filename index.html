          <option value="dk">QWERTY-dk</option>
          <option value="fr(lafayette)">QWERTY-fr</option>
          <option value="gr">QWERTY-gr</option>
          <option value="it">QWERTY-it</option>
          <option value="no">QWERTY-no</option>
          <option value="pt">QWERTY-pt</option>
          <option value="ru">QWERTY-ru</option>
          <option value="se">QWERTY-se</option>
          <option value="ua">QWERTY-ua</option>
          <option value="us" selected>QWERTY-us</option>
          <option value="ch">QWERTZ-ch</option>
          <option value="de">QWERTZ-de</option>

          <option value="us(dvorak)">Dvorak</option>
          <option value="fr(ergol)">Ergo‑L</option>
